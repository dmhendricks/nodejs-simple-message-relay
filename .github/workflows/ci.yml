name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build demo assets
        run: npm run build

      - name: Start server
        run: npm start &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000/ --timeout 10000

      - name: Smoke test - demo page serves
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          if [ "$status" != "200" ]; then
            echo "Expected 200 from /, got $status"
            exit 1
          fi

      - name: Smoke test - relay endpoint echoes payload
        run: |
          response=$(curl -s -X POST http://localhost:3000/send/ci-test \
            -H 'Content-Type: application/json' \
            -d '{"message":"ci smoke test"}')
          echo "$response" | grep -q '"message":"ci smoke test"'
